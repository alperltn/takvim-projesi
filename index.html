<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylık Takvim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr@1.9.1/dist/themes/nano.min.css">
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    <div class="container">
        <div class="calendar-wrapper">
            <!-- Header -->
            <div class="calendar-header">
                <button id="settingsBtn" class="settings-btn" aria-label="Ayarlar">
                    <span>⚙️</span>
                </button>
                
                <div class="month-year">
                    <h1 id="monthYear"></h1>
                </div>
                
                <div class="header-right">
                    <span id="userNameDisplay" class="user-name-display"></span>
                    <div class="profile-dropdown-container">
                        <button id="profileIcon" class="profile-icon" aria-label="Profil">
                            <span class="profile-icon-text">👤</span>
                        </button>
                        <div id="profileDropdown" class="profile-dropdown">
                            <button id="logoutBtn">Çıkış Yap</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Weekday Headers -->
            <div class="weekdays">
                <div class="weekday">Pzt</div>
                <div class="weekday">Sal</div>
                <div class="weekday">Çar</div>
                <div class="weekday">Per</div>
                <div class="weekday">Cum</div>
                <div class="weekday">Cmt</div>
                <div class="weekday">Paz</div>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid" id="calendarGrid">
                <!-- Days will be generated by JavaScript -->
            </div>

            <!-- Footer with today button -->
            <div class="calendar-footer">
                <button class="btn-nav btn-prev" id="prevBtn" aria-label="Önceki ay">
                    <span>&larr;</span>
                </button>
                <button class="btn-today" id="todayBtn">Bugün</button>
                <button class="btn-nav btn-next" id="nextBtn" aria-label="Sonraki ay">
                    <span>&rarr;</span>
                </button>
            </div>
        </div>
    </div>

    <div class="auth-modal-overlay" id="authModalOverlay" aria-hidden="true">
        <div class="auth-modal" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
            <h2 id="authModalTitle">Giriş Yap</h2>
            <form id="authForm" class="auth-form">
                <label for="registerUsername">Kullanıcı Adı</label>
                <input type="text" id="registerUsername" placeholder="Kullanıcı Adı" autocomplete="username" />
                <label for="email-input">E-posta</label>
                <input type="email" id="email-input" placeholder="E-posta adresin" autocomplete="email" />
                <label for="password-input">Şifre</label>
                <input type="password" id="password-input" placeholder="Şifre" autocomplete="current-password" />
                <button type="submit" id="authSubmitButton">Giriş Yap</button>
                <p class="auth-switch-text">Hesabınız yok mu? <span id="toggleAuthMode">Kayıt Olun</span></p>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>Ayarlar</h2>
            <button id="closeSidebarBtn" class="close-sidebar-btn" aria-label="Kapat">&times;</button>
        </div>
        <div class="sidebar-content">
            <div id="mainSettingsView">
                <button class="sidebar-item sidebar-nav-button" id="openThemeSettingsBtn">🎨 Tema</button>
                <button class="sidebar-item" id="profileMenuBtn">👤 Profil</button>
            </div>
            <div id="themeSettingsView" class="settings-panel hidden">
                <button id="backToMainBtn" class="sidebar-back-btn">← Geri</button>
                <div class="settings-field color-picker-field">
                    <label>Arkaplan Rengi</label>
                    <div id="color-picker-bg"></div>
                </div>
                <div class="settings-field color-picker-field">
                    <label>Arayüz Yazı Rengi</label>
                    <div id="color-picker-ui-text"></div>
                </div>
                <div class="settings-field color-picker-field">
                    <label>Not Yazı Rengi</label>
                    <div id="color-picker-note-text"></div>
                </div>
                <div class="settings-field">
                    <label for="uiFont">Arayüz Fontu</label>
                    <select id="uiFont">
                        <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Segoe UI</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="'Roboto', sans-serif">Roboto</option>
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="Verdana, Geneva, sans-serif">Verdana</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="noteFont">Not Fontu</label>
                    <select id="noteFont">
                        <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Segoe UI</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="'Roboto', sans-serif">Roboto</option>
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="Verdana, Geneva, sans-serif">Verdana</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="fontSize">Yazı Boyutu</label>
                    <input type="range" id="fontSize" min="14" max="20" value="16" />
                </div>
                <div class="settings-field toggle-switch" id="themeModeToggle">
                    <span>Karanlık / Aydınlık Mod</span>
                    <button type="button" class="toggle-button active">Karanlık</button>
                </div>
            </div>
            <div id="profileSettingsView" class="settings-panel hidden">
                <button id="backToMainFromProfileBtn" class="sidebar-back-btn">← Geri</button>
                <div class="settings-field">
                    <label for="profileImageInput">Profil Fotoğrafı</label>
                    <div class="profile-image-upload">
                        <img id="profileImagePreview" src="" alt="Profil Fotoğrafı" style="display: none;" />
                        <input type="file" id="profileImageInput" accept="image/*" />
                    </div>
                </div>
                <div class="settings-field">
                    <label>Kullanıcı Adı</label>
                    <p id="displayUsername" class="profile-display-text"></p>
                    <a href="#" id="editUsernameLink" class="profile-edit-link">Kullanıcı adı değiştir</a>
                </div>
                <div class="settings-field">
                    <label>Email</label>
                    <p id="displayEmail" class="profile-display-text"></p>
                    <a href="#" id="editEmailLink" class="profile-edit-link">Email değiştir</a>
                    <a href="#" id="editPasswordLink" class="profile-edit-link">Şifre değiştir</a>
                </div>
                <button id="updateProfileBtn" class="update-profile-btn">Güncelle</button>
            </div>
            <div id="editUsernameView" class="settings-panel hidden">
                <button id="backToProfileFromUsernameBtn" class="sidebar-back-btn">← Geri</button>
                <div class="settings-field">
                    <label for="editUsernameInput">Yeni Kullanıcı Adı</label>
                    <input type="text" id="editUsernameInput" placeholder="Yeni kullanıcı adınızı girin" />
                </div>
                <button id="saveUsernameBtn" class="save-edit-btn">Kaydet</button>
            </div>
            <div id="editEmailView" class="settings-panel hidden">
                <button id="backToProfileFromEmailBtn" class="sidebar-back-btn">← Geri</button>
                <div class="settings-field">
                    <label for="editEmailInput">Yeni Email</label>
                    <input type="email" id="editEmailInput" placeholder="Yeni email adresinizi girin" />
                </div>
                <button id="saveEmailBtn" class="save-edit-btn">Kaydet</button>
            </div>
            <div id="editPasswordView" class="settings-panel hidden">
                <button id="backToProfileFromPasswordBtn" class="sidebar-back-btn">← Geri</button>
                <div class="settings-field">
                    <label for="editPasswordInput">Yeni Şifre</label>
                    <input type="password" id="editPasswordInput" placeholder="Yeni şifrenizi girin" />
                </div>
                <button id="savePasswordBtn" class="save-edit-btn">Kaydet</button>
            </div>
        </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay"></div>

    <!-- Modal for Day Notes -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="noteModal">
            <div class="modal-header">
                <h2 id="modalTitle">Gün Notu</h2>
                <button class="modal-close" id="closeModalBtn" aria-label="Kapat">&times;</button>
            </div>
            <div class="modal-body">
                <textarea 
                    id="notetextarea" 
                    class="note-textarea" 
                    placeholder="Bu gün için bir not yazın..."
                    maxlength="500"
                    rows="6"></textarea>
                <div class="char-count">
                    <span id="charCount">0</span>/500
                </div>
            </div>
            <div class="modal-footer">
                <div class="footer-left">
                    <button class="btn-event" id="eventModalBtn">Etkinlik</button>
                </div>
                <div class="footer-right">
                    <button class="btn-cancel" id="cancelBtn">Kapat</button>
                    <button class="btn-save" id="saveBtn">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div class="modal-overlay" id="eventModalOverlay">
        <div class="modal" id="eventModal">
            <div class="modal-header">
                <h2>Etkinlik Ekle</h2>
                <button class="modal-close" id="closeEventModalBtn" aria-label="Kapat">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="eventTitle">Etkinlik Adı</label>
                    <input type="text" id="eventTitle" class="form-input" placeholder="Etkinlik Adı" />
                </div>
                <div class="form-group">
                    <label for="eventDescription">Açıklama</label>
                    <textarea id="eventDescription" class="form-textarea" placeholder="Etkinlik açıklaması..." rows="4"></textarea>
                </div>
                <div class="form-group all-day-toggle">
                    <input type="checkbox" id="eventAllDay" class="toggle-checkbox" />
                    <label for="eventAllDay" class="toggle-label"></label>
                    <span class="toggle-text">Tüm Gün</span>
                </div>
                <div id="eventTimeContainer" class="time-container">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventStartTime">Başlangıç Saati</label>
                            <input type="time" id="eventStartTime" class="form-input" />
                        </div>
                        <div class="form-group">
                            <label for="eventEndTime">Bitiş Saati</label>
                            <input type="time" id="eventEndTime" class="form-input" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="closeEventBtn">Kapat</button>
                <button class="btn-save" id="saveEventBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr@1.9.1/dist/pickr.min.js"></script>
    <script type="module" src="script.js"></script>

    <!-- Toast Container -->
    <div id="toast-container"></div>
</body>
</html>
