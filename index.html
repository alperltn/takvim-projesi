<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylık Takvim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calendar-wrapper">
            <!-- Header -->
            <div class="calendar-header">
                <button id="settingsBtn" class="settings-btn" aria-label="Ayarlar">
                    <span>⚙️</span>
                </button>
                
                <div class="month-year">
                    <h1 id="monthYear"></h1>
                </div>
                
                <div class="header-right">
                    <span id="userNameDisplay" class="user-name-display"></span>
                    <button id="profileIcon" class="profile-icon" aria-label="Profil">
                        <span class="profile-icon-text">👤</span>
                    </button>
                </div>
            </div>

            <!-- Weekday Headers -->
            <div class="weekdays">
                <div class="weekday">Pzt</div>
                <div class="weekday">Sal</div>
                <div class="weekday">Çar</div>
                <div class="weekday">Per</div>
                <div class="weekday">Cum</div>
                <div class="weekday">Cmt</div>
                <div class="weekday">Paz</div>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid" id="calendarGrid">
                <!-- Days will be generated by JavaScript -->
            </div>

            <!-- Footer with today button -->
            <div class="calendar-footer">
                <button class="btn-nav btn-prev" id="prevBtn" aria-label="Önceki ay">
                    <span>&larr;</span>
                </button>
                <button class="btn-today" id="todayBtn">Bugün</button>
                <button class="btn-nav btn-next" id="nextBtn" aria-label="Sonraki ay">
                    <span>&rarr;</span>
                </button>
            </div>
        </div>
    </div>

    <div class="auth-modal-overlay" id="authModalOverlay" aria-hidden="true">
        <div class="auth-modal" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
            <h2 id="authModalTitle">Giriş Yap</h2>
            <form id="authForm" class="auth-form">
                <label for="registerUsername">Kullanıcı Adı</label>
                <input type="text" id="registerUsername" placeholder="Kullanıcı Adı" autocomplete="username" />
                <label for="email-input">E-posta</label>
                <input type="email" id="email-input" placeholder="E-posta adresin" autocomplete="email" />
                <label for="password-input">Şifre</label>
                <input type="password" id="password-input" placeholder="Şifre" autocomplete="current-password" />
                <button type="submit" id="authSubmitButton">Giriş Yap</button>
                <p class="auth-switch-text">Hesabınız yok mu? <span id="toggleAuthMode">Kayıt Olun</span></p>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>Ayarlar</h2>
            <button id="closeSidebarBtn" class="close-sidebar-btn" aria-label="Kapat">&times;</button>
        </div>
        <div class="sidebar-content">
            <div id="mainSettingsView">
                <button class="sidebar-item sidebar-nav-button" id="openThemeSettingsBtn">🎨 Tema</button>
                <button class="sidebar-item">👁️ Görünüm</button>
                <button class="sidebar-item">👤 Hesap</button>
            </div>
            <div id="themeSettingsView" class="settings-panel hidden">
                <button id="backToMainBtn" class="sidebar-back-btn">← Geri</button>
                <div class="settings-field">
                    <label for="background-color-picker">Arkaplan Rengi</label>
                    <input type="color" id="background-color-picker" value="#1a1a1a" />
                </div>
                <div class="settings-field">
                    <label for="text-color-picker">Yazı Rengi</label>
                    <input type="color" id="text-color-picker" value="#ffffff" />
                </div>
                <div class="settings-field">
                    <label for="font-family-select">Font Tipi</label>
                    <select id="font-family-select">
                        <option value="Segoe UI">Segoe UI</option>
                        <option value="Arial">Arial</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Inter">Inter</option>
                        <option value="Verdana">Verdana</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="font-size-range">Yazı Boyutu</label>
                    <input type="range" id="font-size-range" min="14" max="20" value="16" />
                </div>
                <div class="settings-field toggle-switch" id="themeModeToggle">
                    <span>Karanlık / Aydınlık Mod</span>
                    <button type="button" class="toggle-button active">Karanlık</button>
                </div>
            </div>
        </div>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn">Çıkış Yap</button>
        </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay"></div>

    <!-- Modal for Day Notes -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="noteModal">
            <div class="modal-header">
                <h2 id="modalTitle">Gün Notu</h2>
                <button class="modal-close" id="closeModalBtn" aria-label="Kapat">&times;</button>
            </div>
            <div class="modal-body">
                <textarea 
                    id="notetextarea" 
                    class="note-textarea" 
                    placeholder="Bu gün için bir not yazın..."
                    maxlength="500"
                    rows="6"></textarea>
                <div class="char-count">
                    <span id="charCount">0</span>/500
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelBtn">Kapat</button>
                <button class="btn-save" id="saveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <!-- Toast Container -->
    <div id="toast-container"></div>
</body>
</html>
