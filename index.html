<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylık Takvim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calendar-wrapper">
            <!-- Header -->
             <div id="auth-container" style="background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: right;">
    <span id="user-status" style="margin-right: 15px; font-weight: bold; color: #333;">Giriş Yapılmadı</span>
    
    <input type="text" id="username-input" placeholder="Kullanıcı Adı" style="padding: 5px; margin-right: 5px;">
    <input type="email" id="email-input" placeholder="E-posta adresin" style="padding: 5px; margin-right: 5px;">
    <input type="password" id="password-input" placeholder="Şifre" style="padding: 5px; margin-right: 5px;">
    
    <button id="login-btn" style="padding: 5px 10px; cursor: pointer;">Giriş Yap</button>
    <button id="register-btn" style="padding: 5px 10px; cursor: pointer;">Kayıt Ol</button>
    <button id="logout-btn" style="padding: 5px 10px; cursor: pointer; display: none;">Çıkış Yap</button>
</div>
            <div class="calendar-header">
                <button class="btn-nav btn-prev" id="prevBtn" aria-label="Önceki ay">
                    <span>&larr;</span>
                </button>
                
                <div class="month-year">
                    <h1 id="monthYear"></h1>
                </div>
                
                <button class="btn-nav btn-next" id="nextBtn" aria-label="Sonraki ay">
                    <span>&rarr;</span>
                </button>
            </div>

            <!-- Weekday Headers -->
            <div class="weekdays">
                <div class="weekday">Pzt</div>
                <div class="weekday">Sal</div>
                <div class="weekday">Çar</div>
                <div class="weekday">Per</div>
                <div class="weekday">Cum</div>
                <div class="weekday">Cmt</div>
                <div class="weekday">Paz</div>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid" id="calendarGrid">
                <!-- Days will be generated by JavaScript -->
            </div>

            <!-- Footer with today button -->
            <div class="calendar-footer">
                <button class="btn-today" id="todayBtn">Bugün</button>
            </div>
        </div>
    </div>

    <!-- Modal for Day Notes -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="noteModal">
            <div class="modal-header">
                <h2 id="modalTitle">Gün Notu</h2>
                <button class="modal-close" id="closeModalBtn" aria-label="Kapat">&times;</button>
            </div>
            <div class="modal-body">
                <textarea 
                    id="notetextarea" 
                    class="note-textarea" 
                    placeholder="Bu gün için bir not yazın..."
                    maxlength="500"
                    rows="6"></textarea>
                <div class="char-count">
                    <span id="charCount">0</span>/500
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelBtn">Kapat</button>
                <button class="btn-save" id="saveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
